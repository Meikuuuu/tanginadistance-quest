<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Distance Quest 7.0 – Happy Birthday Hubby! 💙</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    /* --- CORE STYLES --- */
    body, html {
      margin: 0; padding: 0; height: 100%; font-family: 'VT323', monospace;
      background: #000; overflow: hidden; touch-action: none;
      user-select: none; -webkit-user-select: none;
    }
    #gameArea { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
    
    /* --- MAP & CAMERA --- */
    #map {
      position: absolute; width: 3000px; height: 1500px;
      background: url('https://i.imgur.com/5KzXoWb.jpg') repeat;
      background-size: cover; transition: left 0.1s linear, top 0.1s linear;
      image-rendering: pixelated;
      will-change: transform;
    }

    /* --- CHARACTERS --- */
    .character { 
      position: absolute; 
      background-size: contain; 
      background-repeat: no-repeat; 
      z-index: 10; 
      image-rendering: pixelated;
      transform: translateZ(0); /* Hardware acceleration */
    }
    #knight   { width: 64px; height: 128px; background-image: url('https://i.imgur.com/Hw4h8Tf.png'); }
    #princess { width: 64px; height: 128px; background-image: url('https://i.imgur.com/mO4P68N.png'); }
    #cat      { width: 48px; height: 48px; background-image: url('https://i.imgur.com/F2s6kgI.png'); }
    
    .monster  { position: absolute; font-size: 60px; z-index: 12; transform: translateZ(0); }
    .heart    { position: absolute; font-size: 40px; cursor: pointer; z-index: 11; animation: pulse 1.2s infinite alternate; transform: translateZ(0); }
    
    @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.25); } }
    
    #lantern { 
      position: absolute; font-size: 80px; display: none; z-index: 15; 
      animation: float 3.5s ease-in-out infinite alternate; transform: translateZ(0);
    }
    @keyframes float { from { transform: translateY(0); } to { transform: translateY(-25px); } }

    /* --- UI ELEMENTS --- */
    #score {
      position: absolute; top: 10px; left: 10px; font-size: 28px; color: #ff77aa;
      background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 6px; z-index: 20;
      pointer-events: none;
    }
    #text {
      position: absolute; bottom: 20px; left: 0; right: 0; text-align: center;
      font-size: 28px; color: white; text-shadow: 3px 3px 6px #000;
      pointer-events: none; z-index: 20;
    }
    #minimap {
      position: absolute; top: 10px; right: 10px; width: 160px; height: 100px;
      background: rgba(0,0,0,0.6); border: 2px solid #aaa; border-radius: 6px; z-index: 25;
    }
    .minimap-dot { position: absolute; width: 8px; height: 8px; border-radius: 50%; }
    
    #birthdayTitle {
      position: absolute; top: 8%; left: 50%; transform: translateX(-50%);
      font-size: 60px; color: #ff88cc; text-shadow: 4px 4px #000, -4px -4px #000;
      letter-spacing: 4px; text-align: center; white-space: pre-line;
      pointer-events: none; z-index: 8; line-height: 1.1;
    }

    /* --- TOUCH ZONE --- */
    #touchZone {
      position: absolute; bottom: 20px; left: 20px; width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(100,100,255,0.15), transparent 70%);
      border: 2px dashed rgba(255,255,255,0.3); border-radius: 50%; z-index: 30;
      display: none; touch-action: none;
    }
    #joystickKnob {
      position: absolute; width: 60px; height: 60px; background: rgba(255,255,255,0.5);
      border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%);
      pointer-events: none; display: none;
    }

    /* --- RESPONSIVE --- */
    @media (max-width: 800px) {
      #touchZone { display: block; }
      #text { font-size: 24px; bottom: 100px; }
      #birthdayTitle { font-size: 48px; top: 5%; }
    }
  </style>
</head>
<body>

<audio id="bgMusic" loop preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<div id="gameArea">
  <div id="map">
    <div id="birthdayTitle">Happy Birthday Hubby Imran! 🌙💙
Collect hearts for
My Buwan!</div>

    <div id="knight" class="character"></div>
    <div id="princess" class="character"></div>
    <div id="cat" class="character"></div>
    <div id="lantern">🏮</div>
    <div id="text">Use WASD or drag in the circle → move to collect hearts!</div>
  </div>

  <div id="score">Hearts: 0</div>
  <div id="minimap"></div>
  
  <div id="touchZone">
    <div id="joystickKnob"></div>
  </div>
</div>

<script>
// ──────────────────────────────────────────────── Variables
const knight   = document.getElementById('knight');
const cat      = document.getElementById('cat');
const princess = document.getElementById('princess');
const lantern  = document.getElementById('lantern');
const map      = document.getElementById('map');
const scoreUI  = document.getElementById('score');
const textUI   = document.getElementById('text');
const music    = document.getElementById('bgMusic');
const minimap  = document.getElementById('minimap');
const touchZone = document.getElementById('touchZone');
const joystickKnob = document.getElementById('joystickKnob');

// Game State
let knightPos = { x: 120, y: 380 };
let catPos    = { x: 80,  y: 400 };
let score     = 0;
const targetScore = 12;
let isEndingUnlocked = false;

// ─── Islands & Princess ─────────────────────────
const islands = [
  { x: 180,  y: 360, monster: true,  hearts: 3 },
  { x: 780,  y: 580, monster: true,  hearts: 3 },
  { x: 1480, y: 480, monster: true,  hearts: 3 },
  { x: 2180, y: 680, monster: false, hearts: 3 }
];

const princessPos = { x: 2780, y: 620 };

let hearts = [];
let monsters = [];

// ─── Setup ──────────────────────────────────────
princess.style.left = princessPos.x + 'px';
princess.style.top  = princessPos.y + 'px';

music.volume = 0.25;
document.addEventListener('click', () => {
  if(music.paused) music.play().catch(() => {});
}, { once: true });

// Spawn hearts & monsters
function spawnContent() {
  islands.forEach(island => {
    for (let i = 0; i < island.hearts; i++) {
      const h = document.createElement('div');
      h.className = 'heart';
      h.innerHTML = '💗';
      const hx = island.x + 40 + Math.random() * 160;
      const hy = island.y + 30 + Math.random() * 100;
      h.style.left = hx + 'px';
      h.style.top  = hy + 'px';
      map.appendChild(h);
      hearts.push({ el: h, x: hx, y: hy });
    }
    if (island.monster) {
      const m = document.createElement('div');
      m.className = 'monster';
      m.innerHTML = '👾';
      m.style.left = (island.x + 90) + 'px';
      m.style.top  = (island.y + 40) + 'px';
      map.appendChild(m);
      monsters.push({ el: m, x: island.x + 90, y: island.y + 40, defeated: false });
    }
  });
}
spawnContent();

// ─── Input Handling ─────────────────────────────
const keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup',   e => keys[e.key.toLowerCase()] = false);

// Touch Joystick Logic
let touchId = null;
let touchStartX = 0, touchStartY = 0;
let joystickActive = false;
const maxRadius = 60; // Max distance knob can move

touchZone.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  touchId = t.identifier;
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  joystickActive = true;
  joystickKnob.style.display = 'block';
}, { passive: false });

touchZone.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!joystickActive) return;
  
  for (let i = 0; i < e.changedTouches.length; i++) {
    if (e.changedTouches[i].identifier === touchId) {
      const t = e.changedTouches[i];
      let dx = t.clientX - touchStartX;
      let dy = t.clientY - touchStartY;
      
      // Calculate distance
      const distance = Math.sqrt(dx*dx + dy*dy);
      
      // Clamp distance
      if (distance > maxRadius) {
        const ratio = maxRadius / distance;
        dx *= ratio;
        dy *= ratio;
      }

      // Move visual knob
      joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;

      // Apply movement to knight (normalized vector * speed)
      const speed = 12;
      knightPos.x += (dx / maxRadius) * speed;
      knightPos.y += (dy / maxRadius) * speed;
    }
  }
}, { passive: false });

const endTouch = (e) => {
  for (let i = 0; i < e.changedTouches.length; i++) {
    if (e.changedTouches[i].identifier === touchId) {
      joystickActive = false;
      joystickKnob.style.transform = `translate(-50%, -50%)`;
      joystickKnob.style.display = 'none';
    }
  }
};
touchZone.addEventListener('touchend', endTouch);
touchZone.addEventListener('touchcancel', endTouch);

// ─── Game Loop ──────────────────────────────────
let frameCount = 0;

function gameLoop() {
  frameCount++;

  // 1. Keyboard Movement
  const step = 12;
  if (keys['w'] || keys['arrowup'   ]) knightPos.y -= step;
  if (keys['s'] || keys['arrowdown' ]) knightPos.y += step;
  if (keys['a'] || keys['arrowleft' ]) knightPos.x -= step;
  if (keys['d'] || keys['arrowright']) knightPos.x += step;

  // Boundary Checks
  knightPos.x = Math.max(0, Math.min(3000 - 64,  knightPos.x));
  knightPos.y = Math.max(0, Math.min(1500 - 128, knightPos.y));

  // 2. Cat Follow Logic
  catPos.x += (knightPos.x - catPos.x - 16) * 0.12;
  catPos.y += (knightPos.y - catPos.y + 48) * 0.12;

  // 3. Update Positions
  knight.style.left = knightPos.x + 'px';
  knight.style.top  = knightPos.y + 'px';
  cat.style.left    = catPos.x + 'px';
  cat.style.top     = catPos.y + 'px';

  // 4. Camera Logic (Center player)
  const mapW = 3000;
  const mapH = 1500;
  const viewW = window.innerWidth;
  const viewH = window.innerHeight;
  
  // Calculate ideal camera position
  let camX = knightPos.x - viewW / 2 + 32;
  let camY = knightPos.y - viewH / 2 + 64;

  // Clamp camera to map bounds
  camX = Math.max(0, Math.min(camX, mapW - viewW));
  camY = Math.max(0, Math.min(camY, mapH - viewH));

  map.style.left = -camX + 'px';
  map.style.top  = -camY + 'px';

  // 5. Collisions
  checkCollisions();

  // 6. Minimap (Throttled for performance)
  if (frameCount % 5 === 0) updateMinimap();

  requestAnimationFrame(gameLoop);
}
gameLoop();

// ─── Collisions & Ending ────────────────────────
function checkCollisions() {
  if (isEndingUnlocked) return;

  // Hearts
  for (let i = hearts.length - 1; i >= 0; i--) {
    const h = hearts[i];
    if (Math.hypot(knightPos.x - h.x, knightPos.y - h.y) < 50) {
      h.el.remove();
      hearts.splice(i, 1);
      score++;
      scoreUI.textContent = `Hearts: ${score}`;
      
      if (score >= targetScore) {
        unlockEnding();
      }
    }
  }

  // Monsters
  monsters.forEach(m => {
    if (!m.defeated && Math.hypot(knightPos.x - m.x, knightPos.y - m.y) < 60) {
      m.defeated = true;
      m.el.style.display = 'none';
      textUI.textContent = 'Monster Defeated! 💪';
      setTimeout(() => { if (textUI.textContent.includes('Defeated')) textUI.textContent = ''; }, 2200);
    }
  });

  // Princess ending
  if (score >= targetScore && Math.hypot(knightPos.x - princessPos.x, knightPos.y - princessPos.y) < 60) {
    unlockEnding();
  }
}

function unlockEnding() {
  if (isEndingUnlocked) return;
  isEndingUnlocked = true;

  lantern.style.display = 'block';
  lantern.style.left = princessPos.x + 'px';
  lantern.style.top  = (princessPos.y - 110
