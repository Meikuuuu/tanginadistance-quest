<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Distance Quest 7.0 – Happy Birthday Hubby! 💙</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    body, html {
      margin: 0; padding: 0; height: 100%; font-family: 'VT323', monospace;
      background: #000; overflow: hidden; touch-action: none;
    }
    
    /* Start Screen Overlay */
    #startScreen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); z-index: 100;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: white; text-align: center;
    }
    #startBtn {
      padding: 20px 40px; font-size: 30px; background: #ff77aa; border: none;
      color: white; font-family: 'VT323', monospace; cursor: pointer;
      border-radius: 10px; margin-top: 20px; box-shadow: 0 0 15px #ff77aa;
    }

    #gameArea { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
    
    #map {
      position: absolute; width: 3000px; height: 1500px;
      background: url('https://i.imgur.com/5KzXoWb.jpg') repeat;
      background-size: cover; transition: left 0.1s linear, top 0.1s linear;
      image-rendering: pixelated;
    }

    .character { 
      position: absolute; 
      background-size: contain; 
      background-repeat: no-repeat; 
      z-index: 10; 
      image-rendering: pixelated;
      /* Fallback colors if images break */
      background-color: transparent;
    }
    #knight   { width: 64px; height: 128px; background-image: url('https://i.imgur.com/Hw4h8Tf.png'); }
    #princess { width: 64px; height: 128px; background-image: url('https://i.imgur.com/mO4P68N.png'); }
    #cat      { width: 48px; height: 48px; background-image: url('https://i.imgur.com/F2s6kgI.png'); }
    
    .monster  { position: absolute; font-size: 60px; z-index: 12; transform: translateZ(0); }
    .heart    { position: absolute; font-size: 40px; cursor: pointer; z-index: 11; animation: pulse 1.2s infinite alternate; transform: translateZ(0); }
    
    @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.25); } }
    
    #lantern { 
      position: absolute; font-size: 80px; display: none; z-index: 15; 
      animation: float 3.5s ease-in-out infinite alternate; transform: translateZ(0);
    }
    @keyframes float { from { transform: translateY(0); } to { transform: translateY(-25px); } }

    #score {
      position: absolute; top: 10px; left: 10px; font-size: 28px; color: #ff77aa;
      background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 6px; z-index: 20;
      pointer-events: none;
    }
    #text {
      position: absolute; bottom: 20px; left: 0; right: 0; text-align: center;
      font-size: 28px; color: white; text-shadow: 3px 3px 6px #000;
      pointer-events: none; z-index: 20;
    }
    #minimap {
      position: absolute; top: 10px; right: 10px; width: 160px; height: 100px;
      background: rgba(0,0,0,0.6); border: 2px solid #aaa; border-radius: 6px; z-index: 25;
    }
    .minimap-dot { position: absolute; width: 8px; height: 8px; border-radius: 50%; }
    
    #birthdayTitle {
      position: absolute; top: 8%; left: 50%; transform: translateX(-50%);
      font-size: 60px; color: #ff88cc; text-shadow: 4px 4px #000, -4px -4px #000;
      letter-spacing: 4px; text-align: center; white-space: pre-line;
      pointer-events: none; z-index: 8; line-height: 1.1;
    }

    /* Virtual Joystick */
    #joystickZone {
      position: absolute; bottom: 50px; left: 50px; width: 150px; height: 150px;
      background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%; z-index: 30; touch-action: none; display: none;
    }
    #joystickKnob {
      position: absolute; width: 60px; height: 60px; background: rgba(255, 119, 170, 0.8);
      border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%);
      pointer-events: none; box-shadow: 0 0 10px rgba(255, 119, 170, 0.5);
    }

    @media (max-width: 800px) {
      #text { font-size: 24px; bottom: 100px; }
      #birthdayTitle { font-size: 48px; top: 5%; }
      #joystickZone { display: block; }
    }
  </style>
</head>
<body>

<!-- Start Screen Overlay -->
<div id="startScreen">
  <h1>Distance Quest 7.0</h1>
  <p>Happy Birthday Hubby Imran! 💙</p>
  <p style="font-size: 20px; color: #aaa;">(Turn up your volume!)</p>
  <button id="startBtn">Start Game 🎮</button>
</div>

<audio id="bgMusic" loop preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<div id="gameArea">
  <div id="map">
    <div id="birthdayTitle">Happy Birthday Hubby Imran! 🌙💙
Collect hearts for
My Buwan!</div>

    <div id="knight" class="character"></div>
    <div id="princess" class="character"></div>
    <div id="cat" class="character"></div>
    <div id="lantern">🏮</div>
    <div id="text">Use Joystick or WASD to move!</div>
  </div>

  <div id="score">Hearts: 0</div>
  <div id="minimap"></div>
  
  <!-- Virtual Joystick -->
  <div id="joystickZone">
    <div id="joystickKnob"></div>
  </div>
</div>

<script>
// ──────────────────────────────────────────────── Variables
const knight   = document.getElementById('knight');
const cat      = document.getElementById('cat');
const princess = document.getElementById('princess');
const lantern  = document.getElementById('lantern');
const map      = document.getElementById('map');
const scoreUI  = document.getElementById('score');
const textUI   = document.getElementById('text');
const music    = document.getElementById('bgMusic');
const minimap  = document.getElementById('minimap');
const startScreen = document.getElementById('startScreen');
const startBtn = document.getElementById('startBtn');
const joystickZone = document.getElementById('joystickZone');
const joystickKnob = document.getElementById('joystickKnob');

// Game State
let knightPos = { x: 120, y: 380 };
let catPos    = { x: 80,  y: 400 };
let score     = 0;
const targetScore = 12;
let isEndingUnlocked = false;
let isGameRunning = false;

// ─── Islands & Princess ─────────────────────────
const islands = [
  { x: 180,  y: 360, monster: true,  hearts: 3 },
  { x: 780,  y: 580, monster: true,  hearts: 3 },
  { x: 1480, y: 480, monster: true,  hearts: 3 },
  { x: 2180, y: 680, monster: false, hearts: 3 }
];

const princessPos = { x: 2780, y: 620 };

let hearts = [];
let monsters = [];

// ─── Setup ──────────────────────────────────────
princess.style.left = princessPos.x + 'px';
princess.style.top  = princessPos.y + 'px';

music.volume = 0.25;

// Start Game Logic
startBtn.addEventListener('click', () => {
  startScreen.style.display = 'none';
  music.play().catch(e => console.log("Audio play failed:", e));
  isGameRunning = true;
  spawnContent();
  gameLoop();
});

// Spawn hearts & monsters
function spawnContent() {
  islands.forEach(island => {
    for (let i = 0; i < island.hearts; i++) {
      const h = document.createElement('div');
      h.className = 'heart';
      h.innerHTML = '💗';
      const hx = island.x + 40 + Math.random() * 160;
      const hy = island.y + 30 + Math.random() * 100;
      h.style.left = hx + 'px';
      h.style.top  = hy + 'px';
      map.appendChild(h);
      hearts.push({ el: h, x: hx, y: hy });
    }
    if (island.monster) {
      const m = document.createElement('div');
      m.className = 'monster';
      m.innerHTML = '👾';
      m.style.left = (island.x + 90) + 'px';
      m.style.top  = (island.y + 40) + 'px';
      map.appendChild(m);
      monsters.push({ el: m, x: island.x + 90, y: island.y + 40, defeated: false });
    }
  });
}

// ─── Input Handling ─────────────────────────────
const keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup',   e => keys[e.key.toLowerCase()] = false);

// Virtual Joystick Logic
let joystickActive = false;
let joystickCenterX = 0;
let joystickCenterY = 0;
let joystickTouchId = null;

joystickZone.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  joystickTouchId = t.identifier;
  joystickActive = true;
  
  // Get center of joystick zone
  const rect = joystickZone.getBoundingClientRect();
  joystickCenterX = rect.left + rect.width / 2;
  joystickCenterY = rect.top + rect.height / 2;
  
  // Move knob to finger
  moveJoystickKnob(t.clientX, t.clientY);
}, { passive: false });

joystickZone.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!joystickActive) return;
  
  for (let i = 0; i < e.changedTouches.length; i++) {
    if (e.changedTouches[i].identifier === joystickTouchId) {
      const t = e.changedTouches[i];
      moveJoystickKnob(t.clientX, t.clientY);
      
      // Calculate movement vector
      const dx = t.clientX - joystickCenterX;
      const dy = t.clientY - joystickCenterY;
      const distance = Math.sqrt(dx*dx + dy*dy);
      const maxDist = 40; // Max knob movement
      
      // Normalize and apply speed
      const speed = 10;
      if (distance > 0) {
        const moveX = (dx / distance) * speed;
        const moveY = (dy / distance) * speed;
        knightPos.x += moveX;
        knightPos.y += moveY;
      }
    }
  }
}, { passive: false });

const endJoystick = (e) => {
  for (let i = 0; i < e.changedTouches.length; i++) {
    if (e.changedTouches[i].identifier === joystickTouchId) {
      joystickActive = false;
      joystickKnob.style.transform = `translate(-50%, -50%)`;
    }
  }
};
joystickZone.addEventListener('touchend', endJoystick);
joystickZone.addEventListener('touchcancel', endJoystick);

function moveJoystickKnob(clientX, clientY) {
  const dx = clientX - joystickCenterX;
  const dy = clientY - joystickCenterY;
  const distance = Math.sqrt(dx*dx + dy*dy);
  const maxDist = 40; // Max knob movement
  
  if (distance > maxDist) {
    const ratio = maxDist / distance;
    joystickKnob.style.transform = `translate(calc(-50% + ${dx * ratio}px), calc(-50% + ${dy * ratio}px))`;
  } else {
    joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  }
}

// ─── Game Loop ──────────────────────────────────
let frameCount = 0;

function gameLoop() {
  if (!isGameRunning) return;
  frameCount++;

  // 1. Keyboard Movement
  const step = 12;
  if (keys['w'] || keys['arrowup'   ]) knightPos.y -= step;
  if (keys['s'] || keys['arrowdown' ]) knightPos.y += step;
  if (keys['a'] || keys['arrowleft' ]) knightPos.x -= step;
  if (keys['d'] || keys['arrowright']) knightPos.x += step;

  // Boundary Checks
  knightPos.x = Math.max(0, Math.min(3000 - 64,  knightPos.x));
  knightPos.y = Math.max(0, Math.min(1500 - 128, knightPos.y));

  // 2. Cat Follow Logic
  catPos.x += (knightPos.x - catPos.x - 16) * 0.12;
  catPos.y += (knightPos.y - catPos.y + 48) * 0.12;

  // 3. Update Positions
  knight.style.left = knightPos.x + 'px';
  knight.style.top  = knightPos.y + 'px';
  cat.style.left    = catPos.x + 'px';
  cat.style.top     = catPos.y + 'px';

  // 4. Camera Logic (Center player)
  const mapW = 3000;
  const mapH = 1500;
  const viewW = window.innerWidth;
  const
